<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galen — Insight & Action Visualization Sketch</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #0a0a0f;
      color: #e2e2e8;
      overflow: hidden;
      height: 100vh;
    }

    /* ── Layout ── */
    .app {
      display: grid;
      grid-template-columns: 1fr 420px;
      grid-template-rows: 56px 1fr;
      height: 100vh;
    }

    /* ── Top Bar ── */
    .topbar {
      grid-column: 1 / -1;
      background: #111118;
      border-bottom: 1px solid #1e1e2a;
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 16px;
    }
    .topbar .logo {
      font-weight: 700;
      font-size: 18px;
      color: #a78bfa;
      letter-spacing: -0.5px;
    }
    .topbar .breadcrumb {
      font-size: 13px;
      color: #6b6b80;
    }
    .topbar .breadcrumb span { color: #e2e2e8; }
    .alert-badge {
      margin-left: auto;
      background: #ef4444;
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 20px;
      animation: pulse-badge 2s infinite;
    }
    @keyframes pulse-badge {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    /* ── Left: Service Graph ── */
    .graph-panel {
      background: #0d0d14;
      position: relative;
      overflow: hidden;
    }
    .graph-panel .panel-header {
      position: absolute;
      top: 0; left: 0; right: 0;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 10;
      background: linear-gradient(to bottom, #0d0d14 60%, transparent);
    }
    .panel-title {
      font-size: 14px;
      font-weight: 600;
      color: #a0a0b0;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .legend {
      display: flex;
      gap: 16px;
      font-size: 11px;
      color: #6b6b80;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .legend-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
    }
    .legend-dot.healthy { background: #22c55e; }
    .legend-dot.warning { background: #f59e0b; }
    .legend-dot.critical { background: #ef4444; }
    .legend-dot.external { background: #8b5cf6; }

    /* SVG Canvas */
    svg#graph {
      width: 100%;
      height: 100%;
    }

    /* Graph Nodes */
    .node-group { cursor: pointer; }
    .node-group:hover .node-ring { opacity: 1; }

    .node-circle {
      stroke-width: 2;
      transition: all 0.3s ease;
    }
    .node-ring {
      fill: none;
      stroke-width: 2;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .node-label {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      fill: #c0c0d0;
      text-anchor: middle;
      font-weight: 500;
    }
    .node-sublabel {
      font-family: 'Inter', sans-serif;
      font-size: 9px;
      fill: #6b6b80;
      text-anchor: middle;
    }
    .node-icon {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      text-anchor: middle;
      dominant-baseline: central;
    }

    /* Edges */
    .edge {
      stroke: #2a2a3a;
      stroke-width: 1.5;
      fill: none;
    }
    .edge.critical-path {
      stroke: #ef4444;
      stroke-width: 2.5;
      stroke-dasharray: 8, 4;
      animation: dash-flow 1s linear infinite;
    }
    @keyframes dash-flow {
      to { stroke-dashoffset: -12; }
    }
    .edge-label {
      font-family: 'Inter', sans-serif;
      font-size: 9px;
      fill: #4a4a5a;
    }

    /* Health pulse ring */
    .health-pulse {
      fill: none;
      stroke-width: 2;
      opacity: 0;
      animation: health-ring 2s ease-out infinite;
    }
    .health-pulse.critical { stroke: #ef4444; }
    .health-pulse.warning { stroke: #f59e0b; }

    @keyframes health-ring {
      0% { r: 24; opacity: 0.6; }
      100% { r: 40; opacity: 0; }
    }

    /* Tooltip */
    .graph-tooltip {
      position: absolute;
      background: #1a1a28;
      border: 1px solid #2a2a3a;
      border-radius: 10px;
      padding: 14px 18px;
      font-size: 12px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
      z-index: 20;
      min-width: 200px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .graph-tooltip.visible { opacity: 1; }
    .tooltip-title {
      font-weight: 600;
      font-size: 13px;
      margin-bottom: 8px;
    }
    .tooltip-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 4px;
      color: #8b8ba0;
    }
    .tooltip-row .val { color: #e2e2e8; font-weight: 500; }
    .tooltip-row .val.red { color: #ef4444; }
    .tooltip-row .val.yellow { color: #f59e0b; }
    .tooltip-row .val.green { color: #22c55e; }

    /* ── Right: Insight Panel ── */
    .insight-panel {
      background: #111118;
      border-left: 1px solid #1e1e2a;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .insight-panel .panel-header {
      padding: 16px 20px;
      border-bottom: 1px solid #1e1e2a;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .insight-panel .panel-header .severity {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
    }
    .severity.critical { background: #ef444420; color: #ef4444; }
    .severity.warning { background: #f59e0b20; color: #f59e0b; }

    .insight-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    /* Insight Summary Card */
    .insight-summary {
      background: #1a1a28;
      border: 1px solid #2a2a3a;
      border-radius: 12px;
      padding: 18px;
      margin-bottom: 20px;
    }
    .insight-summary h3 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #fff;
    }
    .insight-summary p {
      font-size: 13px;
      color: #8b8ba0;
      line-height: 1.6;
    }
    .insight-meta {
      display: flex;
      gap: 16px;
      margin-top: 12px;
      font-size: 11px;
      color: #6b6b80;
    }
    .insight-meta span {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* Causal Chain */
    .causal-chain {
      margin-bottom: 24px;
    }
    .causal-chain h4 {
      font-size: 12px;
      font-weight: 600;
      color: #a0a0b0;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 14px;
    }

    .chain-step {
      display: flex;
      gap: 14px;
      position: relative;
      padding-bottom: 20px;
      cursor: pointer;
      transition: background 0.2s;
      padding: 10px 12px;
      border-radius: 8px;
    }
    .chain-step:hover {
      background: #1a1a28;
    }
    .chain-step:not(:last-child)::after {
      content: '';
      position: absolute;
      left: 24px;
      top: 36px;
      bottom: -2px;
      width: 2px;
      background: linear-gradient(to bottom, #ef4444, #f59e0b);
    }

    .step-indicator {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
      position: relative;
      z-index: 1;
    }
    .step-indicator.root { background: #ef444430; color: #ef4444; border: 2px solid #ef4444; }
    .step-indicator.intermediate { background: #f59e0b30; color: #f59e0b; border: 2px solid #f59e0b; }
    .step-indicator.symptom { background: #8b5cf630; color: #8b5cf6; border: 2px solid #8b5cf6; }

    .step-content { flex: 1; }
    .step-content .step-title {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 3px;
    }
    .step-content .step-desc {
      font-size: 12px;
      color: #6b6b80;
      line-height: 1.5;
    }
    .step-content .step-evidence {
      margin-top: 6px;
      font-size: 11px;
      color: #8b5cf6;
      font-family: 'SF Mono', 'Source Code Pro', monospace;
    }
    .step-tag {
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
      display: block;
    }
    .step-tag.root-cause { color: #ef4444; }
    .step-tag.propagation { color: #f59e0b; }
    .step-tag.impact { color: #8b5cf6; }

    /* Impact Metrics */
    .impact-metrics {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 24px;
    }
    .impact-card {
      background: #1a1a28;
      border: 1px solid #2a2a3a;
      border-radius: 10px;
      padding: 14px;
    }
    .impact-card .impact-label {
      font-size: 11px;
      color: #6b6b80;
      margin-bottom: 4px;
    }
    .impact-card .impact-value {
      font-size: 20px;
      font-weight: 700;
    }
    .impact-card .impact-value.red { color: #ef4444; }
    .impact-card .impact-value.yellow { color: #f59e0b; }
    .impact-card .impact-delta {
      font-size: 11px;
      color: #ef4444;
      margin-top: 2px;
    }

    /* Sparkline */
    .sparkline-container {
      margin-top: 8px;
      height: 30px;
    }
    .sparkline-container svg {
      width: 100%;
      height: 100%;
    }

    /* Actions */
    .actions-section h4 {
      font-size: 12px;
      font-weight: 600;
      color: #a0a0b0;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 14px;
    }
    .action-card {
      background: #1a1a28;
      border: 1px solid #2a2a3a;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .action-card:hover {
      border-color: #a78bfa;
      background: #1e1e30;
    }
    .action-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }
    .action-title {
      font-size: 13px;
      font-weight: 600;
    }
    .action-confidence {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 8px;
    }
    .action-confidence.high { background: #22c55e20; color: #22c55e; }
    .action-confidence.medium { background: #f59e0b20; color: #f59e0b; }
    .action-desc {
      font-size: 12px;
      color: #6b6b80;
      line-height: 1.5;
      margin-bottom: 10px;
    }
    .action-button {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
    }
    .action-button.primary {
      background: #a78bfa;
      color: #fff;
    }
    .action-button.primary:hover { background: #8b5cf6; }
    .action-button.secondary {
      background: transparent;
      color: #a78bfa;
      border: 1px solid #a78bfa40;
    }
    .action-button.secondary:hover { background: #a78bfa10; }

    /* Timeline */
    .timeline-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: #111118;
      border-top: 1px solid #1e1e2a;
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 8px;
    }
    .timeline-track {
      flex: 1;
      height: 4px;
      background: #1e1e2a;
      border-radius: 4px;
      position: relative;
    }
    .timeline-event {
      position: absolute;
      top: -6px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      transform: translateX(-50%);
      cursor: pointer;
      transition: all 0.2s;
      border: 2px solid;
    }
    .timeline-event:hover {
      transform: translateX(-50%) scale(1.4);
      z-index: 5;
    }
    .timeline-event.deploy { background: #8b5cf630; border-color: #8b5cf6; }
    .timeline-event.alert { background: #ef444430; border-color: #ef4444; }
    .timeline-event.change { background: #f59e0b30; border-color: #f59e0b; }
    .timeline-event.recovery { background: #22c55e30; border-color: #22c55e; }

    .timeline-label {
      font-size: 10px;
      color: #6b6b80;
      white-space: nowrap;
    }
    .timeline-now {
      position: absolute;
      right: 0;
      top: -6px;
      width: 16px;
      height: 16px;
      background: #a78bfa;
      border-radius: 50%;
      border: 2px solid #0d0d14;
    }

    /* Scrollbar */
    .insight-body::-webkit-scrollbar { width: 6px; }
    .insight-body::-webkit-scrollbar-track { background: transparent; }
    .insight-body::-webkit-scrollbar-thumb { background: #2a2a3a; border-radius: 3px; }
    .insight-body::-webkit-scrollbar-thumb:hover { background: #3a3a4a; }

    /* Empty state for right panel */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #4a4a5a;
      text-align: center;
      padding: 40px;
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }
    .empty-state h3 { font-size: 16px; font-weight: 600; color: #6b6b80; margin-bottom: 8px; }
    .empty-state p { font-size: 13px; line-height: 1.6; }

    /* Annotations */
    .sketch-annotation {
      position: fixed;
      background: #a78bfa;
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      padding: 6px 12px;
      border-radius: 6px;
      z-index: 100;
      pointer-events: none;
      box-shadow: 0 4px 16px rgba(167, 139, 250, 0.3);
    }
    .sketch-annotation::before {
      content: '';
      position: absolute;
      width: 12px;
      height: 12px;
      background: #a78bfa;
      transform: rotate(45deg);
    }
    .annotation-1 { top: 120px; left: 80px; }
    .annotation-1::before { bottom: -5px; left: 20px; }
    .annotation-2 { top: 80px; right: 440px; }
    .annotation-2::before { bottom: -5px; right: 20px; }
    .annotation-3 { bottom: 90px; left: 300px; }
    .annotation-3::before { top: -5px; left: 20px; }
    .annotation-4 { top: 120px; right: 40px; }
    .annotation-4::before { bottom: -5px; right: 30px; }

    /* Fade-in */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.4s ease forwards; }
    .fade-in-delay-1 { animation-delay: 0.1s; opacity: 0; }
    .fade-in-delay-2 { animation-delay: 0.2s; opacity: 0; }
    .fade-in-delay-3 { animation-delay: 0.3s; opacity: 0; }
  </style>
</head>
<body>

<div class="app">
  <!-- Top Bar -->
  <div class="topbar">
    <div class="logo">Galen</div>
    <div class="breadcrumb">Insight & Action &rsaquo; <span>Service Health</span></div>
    <div class="alert-badge">2 Active Incidents</div>
  </div>

  <!-- Left: Service Dependency Graph -->
  <div class="graph-panel" id="graphPanel">
    <div class="panel-header">
      <div class="panel-title">Service Topology</div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot healthy"></div> Healthy</div>
        <div class="legend-item"><div class="legend-dot warning"></div> Degraded</div>
        <div class="legend-item"><div class="legend-dot critical"></div> Critical</div>
        <div class="legend-item"><div class="legend-dot external"></div> External</div>
      </div>
    </div>

    <svg id="graph" viewBox="0 0 900 600"></svg>

    <div class="graph-tooltip" id="tooltip"></div>

    <!-- Timeline Bar -->
    <div class="timeline-bar">
      <div class="timeline-label">2h ago</div>
      <div class="timeline-track">
        <div class="timeline-event deploy" style="left: 15%;" title="currency-svc v2.4 deployed"></div>
        <div class="timeline-event change" style="left: 30%;" title="Config change: rate-limit updated"></div>
        <div class="timeline-event alert" style="left: 55%;" title="Alert: currency-svc latency > 2s"></div>
        <div class="timeline-event alert" style="left: 68%;" title="Alert: checkout error rate > 5%"></div>
        <div class="timeline-event recovery" style="left: 85%;" title="Partial recovery detected"></div>
        <div class="timeline-now"></div>
      </div>
      <div class="timeline-label">Now</div>
    </div>
  </div>

  <!-- Right: Insight & Action Panel -->
  <div class="insight-panel" id="insightPanel">
    <!-- filled dynamically -->
  </div>
</div>

<!-- Design Annotations (sketch notes) -->
<div class="sketch-annotation annotation-1">
  Click any node to drill in
</div>
<div class="sketch-annotation annotation-2">
  Red dashed = fault propagation path
</div>
<div class="sketch-annotation annotation-3">
  Timeline: correlate events with incidents
</div>
<div class="sketch-annotation annotation-4">
  Causal chain + recommended actions
</div>

<script>
// ────────────────────────────────
// DATA MODEL
// ────────────────────────────────
const nodes = [
  { id: 'frontend',      label: 'frontend',           type: 'service',    status: 'warning',  x: 140, y: 300, icon: '🌐', metrics: { latency: '1.2s', errors: '2.1%', rps: '1.2k' } },
  { id: 'api-gateway',   label: 'api-gateway',        type: 'deployment', status: 'healthy',  x: 340, y: 300, icon: '⚡', metrics: { latency: '45ms', errors: '0.1%', rps: '3.5k' } },
  { id: 'ad',            label: 'ad',                 type: 'service',    status: 'healthy',  x: 560, y: 100, icon: '📢', metrics: { latency: '80ms', errors: '0.0%', rps: '800' } },
  { id: 'cart',          label: 'cart',                type: 'service',    status: 'healthy',  x: 560, y: 200, icon: '🛒', metrics: { latency: '120ms', errors: '0.2%', rps: '600' } },
  { id: 'checkout',      label: 'checkout',            type: 'service',    status: 'critical', x: 560, y: 300, icon: '💳', metrics: { latency: '4.8s', errors: '12.3%', rps: '450' } },
  { id: 'currency',      label: 'currency',            type: 'service',    status: 'critical', x: 560, y: 400, icon: '💱', metrics: { latency: '8.2s', errors: '45.1%', rps: '200' } },
  { id: 'product',       label: 'product-catalog',     type: 'service',    status: 'healthy',  x: 560, y: 500, icon: '📦', metrics: { latency: '95ms', errors: '0.1%', rps: '900' } },
  { id: 'recommendation',label: 'recommendation',      type: 'service',    status: 'warning',  x: 760, y: 200, icon: '🎯', metrics: { latency: '340ms', errors: '1.8%', rps: '700' } },
  { id: 'ext-exchange',  label: 'exchange-api',        type: 'external',   status: 'critical', x: 760, y: 400, icon: '🔗', metrics: { latency: '12s', errors: '68%', rps: '50' } },
  { id: 'redis',         label: 'redis-cache',         type: 'infra',      status: 'healthy',  x: 760, y: 100, icon: '🗄️', metrics: { latency: '2ms', errors: '0.0%', rps: '5k' } },
];

const edges = [
  { from: 'frontend',    to: 'api-gateway',    label: 'routes' },
  { from: 'api-gateway',  to: 'ad',             label: 'uses' },
  { from: 'api-gateway',  to: 'cart',           label: 'uses' },
  { from: 'api-gateway',  to: 'checkout',       label: 'uses',   critical: true },
  { from: 'api-gateway',  to: 'currency',       label: 'uses',   critical: true },
  { from: 'api-gateway',  to: 'product',        label: 'uses' },
  { from: 'checkout',     to: 'currency',       label: 'calls',  critical: true },
  { from: 'currency',     to: 'ext-exchange',   label: 'fetches', critical: true },
  { from: 'checkout',     to: 'cart',           label: 'reads' },
  { from: 'recommendation', to: 'product',      label: 'queries' },
  { from: 'ad',           to: 'redis',          label: 'caches' },
  { from: 'recommendation', to: 'redis',        label: 'caches' },
];

const insightData = {
  'checkout': {
    severity: 'critical',
    title: 'Checkout Failure Cascade',
    summary: 'Checkout service error rate spiked to 12.3% due to upstream currency service timeouts. Root cause traced to external exchange rate API degradation after currency-svc v2.4 deployment removed request caching.',
    detected: '47 min ago',
    affected: '~2,100 users',
    revenue: '$18.4k/hr',
    chain: [
      { type: 'root-cause', title: 'currency-svc v2.4 removed response cache', desc: 'Deployment at 14:22 removed Redis caching layer for exchange rate lookups', evidence: 'git diff: deleted cache_middleware.ts', color: '#ef4444' },
      { type: 'propagation', title: 'Exchange API rate limit exceeded', desc: 'Direct calls to external API hit 50 req/s limit, causing 68% failure rate', evidence: 'exchange-api: HTTP 429 Too Many Requests', color: '#f59e0b' },
      { type: 'propagation', title: 'Currency service latency → 8.2s', desc: 'Failed lookups trigger retry storm with exponential backoff, avg 8.2s response', evidence: 'p99 latency: 8.2s (baseline: 45ms)', color: '#f59e0b' },
      { type: 'impact', title: 'Checkout error rate → 12.3%', desc: 'Synchronous dependency on currency causes checkout timeouts and failures', evidence: 'error_rate: 12.3% | affected_orders: 847', color: '#8b5cf6' },

// ────────────────────────────────
// RENDER GRAPH
// ────────────────────────────────
const svg = document.getElementById('graph');
const NS = 'http://www.w3.org/2000/svg';

function createSVGElement(tag, attrs = {}) {
  const el = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
  return el;
}

// Draw edges
edges.forEach(e => {
  const from = nodes.find(n => n.id === e.from);
  const to = nodes.find(n => n.id === e.to);
  if (!from || !to) return;

  const path = createSVGElement('path', {
    d: `M${from.x},${from.y} C${(from.x + to.x) / 2},${from.y} ${(from.x + to.x) / 2},${to.y} ${to.x},${to.y}`,
    class: `edge ${e.critical ? 'critical-path' : ''}`,
  });
  svg.appendChild(path);

  // Edge label
  const mx = (from.x + to.x) / 2;
  const my = (from.y + to.y) / 2 - 8;
  const label = createSVGElement('text', { x: mx, y: my, class: 'edge-label', 'text-anchor': 'middle' });
  label.textContent = e.label;
  svg.appendChild(label);
});

// Draw nodes
const statusColors = {
  healthy: '#22c55e',
  warning: '#f59e0b',
  critical: '#ef4444',
};

nodes.forEach(n => {
  const g = createSVGElement('g', { class: 'node-group', 'data-id': n.id });
  g.setAttribute('transform', `translate(${n.x}, ${n.y})`);

  const fill = n.type === 'external' ? '#8b5cf6' : (statusColors[n.status] || '#22c55e');
  const bgFill = n.status === 'critical' ? '#1a0a0a' : n.status === 'warning' ? '#1a1508' : '#0a1a0a';

  // Pulse ring for unhealthy nodes
  if (n.status === 'critical' || n.status === 'warning') {
    const pulse = createSVGElement('circle', {
      cx: 0, cy: 0, r: 24,
      class: `health-pulse ${n.status}`,
    });
    g.appendChild(pulse);
  }

  // Outer ring on hover
  const ring = createSVGElement('circle', {
    cx: 0, cy: 0, r: 30,
    class: 'node-ring',
    stroke: fill,
  });
  g.appendChild(ring);

  // Main circle
  const circle = createSVGElement('circle', {
    cx: 0, cy: 0, r: 24,
    class: 'node-circle',
    fill: bgFill,
    stroke: fill,
  });
  g.appendChild(circle);

  // Icon
  const icon = createSVGElement('text', { x: 0, y: 0, class: 'node-icon' });
  icon.textContent = n.icon;
  g.appendChild(icon);

  // Label
  const label = createSVGElement('text', { x: 0, y: 40, class: 'node-label' });
  label.textContent = n.label;
  g.appendChild(label);

  // Sublabel
  const sublabel = createSVGElement('text', { x: 0, y: 52, class: 'node-sublabel' });
  sublabel.textContent = n.type;
  g.appendChild(sublabel);

  // Interaction
  g.addEventListener('mouseenter', (e) => showTooltip(e, n));
  g.addEventListener('mouseleave', hideTooltip);
  g.addEventListener('click', () => showInsight(n.id));

  svg.appendChild(g);
});

// ────────────────────────────────
// TOOLTIP
// ────────────────────────────────
const tooltip = document.getElementById('tooltip');

function showTooltip(event, node) {
  const panel = document.getElementById('graphPanel');
  const rect = panel.getBoundingClientRect();
  const x = event.clientX - rect.left + 16;
  const y = event.clientY - rect.top - 20;

  const statusColor = node.status === 'critical' ? 'red' : node.status === 'warning' ? 'yellow' : 'green';
  tooltip.innerHTML = `
    <div class="tooltip-title">${node.label}</div>
    <div class="tooltip-row"><span>Status</span><span class="val ${statusColor}">${node.status.toUpperCase()}</span></div>
    <div class="tooltip-row"><span>Latency</span><span class="val ${node.metrics.latency.includes('s') && parseFloat(node.metrics.latency) > 1 ? 'red' : ''}">${node.metrics.latency}</span></div>
    <div class="tooltip-row"><span>Error Rate</span><span class="val ${parseFloat(node.metrics.errors) > 5 ? 'red' : parseFloat(node.metrics.errors) > 1 ? 'yellow' : 'green'}">${node.metrics.errors}</span></div>
    <div class="tooltip-row"><span>Requests/s</span><span class="val">${node.metrics.rps}</span></div>
  `;
  tooltip.style.left = x + 'px';
  tooltip.style.top = y + 'px';
  tooltip.classList.add('visible');
}

function hideTooltip() {
  tooltip.classList.remove('visible');
}

// ────────────────────────────────
// INSIGHT PANEL
// ────────────────────────────────
const insightPanel = document.getElementById('insightPanel');

// Show empty state on load
showEmptyState();

function showEmptyState() {
  insightPanel.innerHTML = `
    <div class="panel-header">
      <div class="panel-title">Insight & Action</div>
    </div>
    <div class="empty-state">
      <div class="icon">🔍</div>
      <h3>Select a service to investigate</h3>
      <p>Click on any node in the service graph to see root cause analysis, causal chains, and recommended actions.</p>
    </div>
  `;
}

function showInsight(nodeId) {
  const data = insightData[nodeId];
  if (!data) {
    showEmptyState();
    return;
  }

  // Highlight selected node
  document.querySelectorAll('.node-group').forEach(g => {
    g.querySelector('.node-ring').style.opacity = g.getAttribute('data-id') === nodeId ? '1' : '0';
  });

  const chainHTML = data.chain.map((step, i) => `
    <div class="chain-step fade-in fade-in-delay-${Math.min(i, 3)}">
      <div class="step-indicator ${step.type === 'root-cause' ? 'root' : step.type === 'propagation' ? 'intermediate' : 'symptom'}">
        ${i + 1}
      </div>
      <div class="step-content">
        <span class="step-tag ${step.type}">${step.type.replace('-', ' ')}</span>
        <div class="step-title">${step.title}</div>
        <div class="step-desc">${step.desc}</div>
        <div class="step-evidence">${step.evidence}</div>
      </div>
    </div>
  `).join('');

  const metricsHTML = data.impactMetrics.map(m => `
    <div class="impact-card">
      <div class="impact-label">${m.label}</div>
      <div class="impact-value ${m.color}">${m.value}</div>
      <div class="impact-delta">${m.delta}</div>
    </div>
  `).join('');

  const actionsHTML = data.actions.map(a => `
    <div class="action-card">
      <div class="action-header">
        <div class="action-title">${a.title}</div>
        <div class="action-confidence ${a.confidence}">${a.confidence} confidence</div>
      </div>
      <div class="action-desc">${a.desc}</div>
      <button class="action-button ${a.type}">
        ${a.type === 'primary' ? '▶ Execute' : '📋 View Details'}
      </button>
    </div>
  `).join('');

  insightPanel.innerHTML = `
    <div class="panel-header">
      <div class="panel-title">Insight & Action</div>
      <div class="severity ${data.severity}">${data.severity}</div>
    </div>
    <div class="insight-body">
      <div class="insight-summary fade-in">
        <h3>${data.title}</h3>
        <p>${data.summary}</p>
        <div class="insight-meta">
          <span>⏱ Detected ${data.detected}</span>
          <span>👥 ${data.affected}</span>
        </div>
      </div>

      <div class="impact-metrics fade-in fade-in-delay-1">
        ${metricsHTML}
      </div>

      <div class="causal-chain fade-in fade-in-delay-2">
        <h4>Causal Chain</h4>
        ${chainHTML}
      </div>

      <div class="actions-section fade-in fade-in-delay-3">
        <h4>Recommended Actions</h4>
        ${actionsHTML}
      </div>
    </div>
  `;
}

// Auto-select checkout to show the insight on load
setTimeout(() => showInsight('checkout'), 800);

// Hide annotations after 6 seconds
setTimeout(() => {
  document.querySelectorAll('.sketch-annotation').forEach(el => {
    el.style.transition = 'opacity 1s';
    el.style.opacity = '0';
    setTimeout(() => el.remove(), 1000);
  });
}, 6000);
</script>
