<!DOCTYPE html>
<html>
<head>
    <title>Generate Galen Favicon</title>
</head>
<body>
    <canvas id="canvas" width="512" height="512"></canvas>
    <div style="margin-top: 20px;">
        <button onclick="downloadPNG()">Download PNG</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // Background - Navy
        ctx.fillStyle = '#374A5C';
        ctx.fillRect(0, 0, 512, 512);

        // Add rounded corners effect by clipping
        ctx.globalCompositeOperation = 'destination-in';
        ctx.beginPath();
        ctx.roundRect(0, 0, 512, 512, 90);
        ctx.fill();
        ctx.globalCompositeOperation = 'source-over';

        // First layer (transparent white)
        ctx.fillStyle = 'rgba(255,255,255,0.7)';
        ctx.beginPath();
        ctx.moveTo(80, 154);
        ctx.lineTo(336, 154);
        ctx.lineTo(320, 234);
        ctx.lineTo(64, 234);
        ctx.closePath();
        ctx.fill();

        // Second layer (solid white)
        ctx.fillStyle = 'rgba(255,255,255,1)';
        ctx.beginPath();
        ctx.moveTo(176, 218);
        ctx.lineTo(432, 218);
        ctx.lineTo(416, 298);
        ctx.lineTo(160, 298);
        ctx.closePath();
        ctx.fill();

        function downloadPNG() {
            canvas.toBlob(function(blob) {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'galen-favicon.png';
                a.click();
            });
        }

        // Auto-download after 1 second
        setTimeout(downloadPNG, 1000);
    </script>
</body>
</html>
